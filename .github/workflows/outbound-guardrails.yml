name: Outbound Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  outbound-policy-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run outbound guardrail tests
        run: |
          PYTHONPATH=. pytest -q tests/test_outbound_guardrails.py
